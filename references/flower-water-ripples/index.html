<head>
<meta charset="UTF-8">

<title>Eau de Printemps — pastel water ripples</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300,0,0" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; }
  body{
    font-family:'Karla',sans-serif;
    background:linear-gradient(180deg,#e8eef3,#d6e2ea);
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
    user-select:none;
  }
  #stage{ position:fixed; inset:0; cursor:none; }
  #stage canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  header{
    position:fixed; top:24px; left:0; right:0;
    text-align:center; pointer-events:none; z-index:5;
  }
  header h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500; font-style:italic;
    font-size:clamp(19px, 2.8vw, 28px);
    letter-spacing:.16em;
    color:#54718c;
    text-shadow:0 1px 0 rgba(255,255,255,.95), 0 0 14px rgba(255,255,255,.95);
  }
  header p{
    margin-top:4px;
    font-size:9.5px; letter-spacing:.46em; text-transform:uppercase;
    color:#6c8aa3;
    text-shadow:0 1px 0 rgba(255,255,255,.95), 0 0 10px rgba(255,255,255,.9);
  }

  #hint{
    position:fixed; left:50%; top:55%;
    transform:translate(-50%,-50%);
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:clamp(15px,2.2vw,19px);
    letter-spacing:.24em; color:rgba(105,130,150,.85);
    text-shadow:0 1px 3px rgba(255,255,255,.95);
    pointer-events:none; z-index:6;
    animation:hintFloat 3.2s ease-in-out infinite;
    transition:opacity 1.2s ease;
  }
  #hint.gone{ opacity:0; }
  @keyframes hintFloat{ 0%,100%{transform:translate(-50%,-52%)} 50%{transform:translate(-50%,-48%)} }

  #panel{
    position:fixed; left:50%; bottom:max(16px, env(safe-area-inset-bottom));
    transform:translateX(-50%);
    display:flex; align-items:center; gap:20px;
    padding:12px 24px;
    background:rgba(250,253,255,.55);
    backdrop-filter:blur(16px) saturate(1.25);
    -webkit-backdrop-filter:blur(16px) saturate(1.25);
    border:1px solid rgba(255,255,255,.9);
    border-radius:30px;
    box-shadow:0 14px 38px -12px rgba(120,150,175,.4), inset 0 1px 0 rgba(255,255,255,.95);
    z-index:10;
    transition:transform .35s ease, opacity .35s ease;
  }
  #panel.hidden{
    transform:translate(-50%, 150%);
    opacity:0;
    pointer-events:none;
  }
  #panelToggle{
    position:fixed; right:18px; bottom:max(18px, env(safe-area-inset-bottom));
    z-index:11;
    display:flex; align-items:center; justify-content:center;
    width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(255,255,255,.95);
    background:rgba(250,253,255,.82);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    color:#7d9cb5; cursor:pointer;
    box-shadow:0 8px 20px -6px rgba(120,155,180,.5);
    transition:transform .2s ease;
  }
  #panelToggle:active{ transform:scale(.92); }
  #panelToggle .material-symbols-rounded{ font-size:22px; }
  .ctl{ display:flex; flex-direction:column; gap:6px; align-items:center; }
  .ctl label{
    font-size:8.5px; font-weight:600; letter-spacing:.3em; text-transform:uppercase;
    color:#8aa0b4; white-space:nowrap;
  }
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:100px; height:18px; background:transparent; cursor:pointer;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:3px; border-radius:2px;
    background:linear-gradient(90deg, #c4d8e4, #f0bfd2);
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px; border-radius:50%;
    background:#fff; border:2px solid #b7cbdb;
    margin-top:-5.5px;
    box-shadow:0 2px 6px rgba(120,155,180,.45);
    transition:transform .15s ease;
  }
  input[type=range]::-webkit-slider-thumb:hover{ transform:scale(1.2); }
  input[type=range]::-moz-range-track{
    height:3px; border-radius:2px;
    background:linear-gradient(90deg, #c4d8e4, #f0bfd2);
  }
  input[type=range]::-moz-range-thumb{
    width:11px; height:11px; border-radius:50%;
    background:#fff; border:2px solid #b7cbdb;
    box-shadow:0 2px 6px rgba(120,155,180,.45);
  }
  .divider{ width:1px; height:30px; background:linear-gradient(180deg,transparent,#c9d8e2,transparent); }
  .btn{
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:50%;
    border:1px solid rgba(255,255,255,.95);
    background:linear-gradient(150deg,#ffffff,#eef5f9);
    color:#8aa6bc; cursor:pointer;
    box-shadow:0 4px 12px -2px rgba(120,155,180,.4);
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .btn:hover{ transform:translateY(-2px) scale(1.06); box-shadow:0 8px 18px -4px rgba(120,155,180,.55); }
  .btn:active{ transform:scale(.94); }
  .btn .material-symbols-rounded{ font-size:19px; }

  #cursor{
    position:fixed; width:22px; height:22px; pointer-events:none; z-index:50;
    transform:translate(-50%,-50%) rotate(-18deg);
    transition:opacity .3s; opacity:0;
  }

  @media (max-width:720px){
    #stage{ cursor:auto; }
    #cursor{ display:none; }
    #panel{
      display:grid; grid-template-columns:repeat(2, auto);
      justify-content:center; align-items:end;
      gap:16px 28px;
      max-width:calc(100vw - 24px); padding:18px 24px; border-radius:24px;
      bottom:max(76px, calc(env(safe-area-inset-bottom) + 60px));
    }
    .divider{ display:none; }
    #panel .btn{ justify-self:center; }
    input[type=range]{ width:104px; }
    header{ top:14px; }
  }
  #credit{
    position:fixed; left:9px; bottom:6px; z-index:30;
    font-family:'Karla',-apple-system,sans-serif;
    font-size:9px; letter-spacing:.06em;
    color:rgba(255,255,255,.62);
    text-shadow:0 1px 2px rgba(60,80,95,.45);
    text-decoration:none; pointer-events:auto;
    mix-blend-mode:soft-light;
  }
  #credit:hover{ color:rgba(255,255,255,.92); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="gl"></canvas>
  <canvas id="fx"></canvas>
</div>

<header>
  <h1>Eau de Printemps</h1>
  <p>pastel water ripples</p>
</header>

<div id="hint">ふれてみて &nbsp;·&nbsp; touch the water</div>

<svg id="cursor" viewBox="0 0 24 24"><path d="M12 2 C17 5 20 10 19 16 C18 21 14 23 12 22 C10 23 6 21 5 16 C4 10 7 5 12 2 Z" fill="rgba(255,210,224,.85)" stroke="rgba(200,150,175,.9)" stroke-width="1"/></svg>

<button id="panelToggle" title="settings"><span class="material-symbols-rounded">tune</span></button>

<div id="panel">
  <div class="ctl"><label>sparkle</label><input type="range" id="rSparkle" min="0" max="2" step="0.01" value="1"></div>
  <div class="ctl"><label>ripple</label><input type="range" id="rRipple" min="0.2" max="2.4" step="0.01" value="1"></div>
  <div class="ctl"><label>petals</label><input type="range" id="rPetals" min="0" max="12" step="1" value="5"></div>
  <div class="ctl"><label>light</label><input type="range" id="rLight" min="0" max="2" step="0.01" value="1"></div>
  <div class="divider"></div>
  <button class="btn" id="btnReset" title="reset"><span class="material-symbols-rounded">restart_alt</span></button>
  <button class="btn" id="btnSave" title="save image"><span class="material-symbols-rounded">photo_camera</span></button>
</div>

/* ============================== setup ============================== */
const glCv = document.getElementById('gl');
const fxCv = document.getElementById('fx');
const fctx = fxCv.getContext('2d');
const DPR  = Math.min(window.devicePixelRatio || 1, 2);

let W = 0, H = 0;
const params = { sparkle: 1, ripple: 1, petals: 5, light: 1 };

/* ===================== water sim (CPU, coarse) ===================== */
const NX = 160;
let NY = 160;
let u, uPrev, simBytes;

function allocSim() {
  NY = Math.max(90, Math.min(288, Math.round(NX * H / W)));
  u        = new Float32Array(NX * NY);
  uPrev    = new Float32Array(NX * NY);
  simBytes = new Uint8Array(NX * NY);
  simBytes.fill(128);
}

function drop(gx, gy, radius, strength) {
  const r2 = radius * radius;
  const x0 = Math.max(1, Math.floor(gx - radius)), x1 = Math.min(NX - 2, Math.ceil(gx + radius));
  const y0 = Math.max(1, Math.floor(gy - radius)), y1 = Math.min(NY - 2, Math.ceil(gy + radius));
  for (let y = y0; y <= y1; y++) {
    for (let x = x0; x <= x1; x++) {
      const dx = x - gx, dy = y - gy;
      const d2 = dx * dx + dy * dy;
      if (d2 < r2) {
        const k = Math.cos((Math.sqrt(d2) / radius) * Math.PI * 0.5);
        u[y * NX + x] += strength * k * k;
      }
    }
  }
}

function stepWater() {
  const damp = 0.979;
  for (let y = 1; y < NY - 1; y++) {
    const row = y * NX;
    for (let x = 1; x < NX - 1; x++) {
      const i = row + x;
      let v = (u[i - 1] + u[i + 1] + u[i - NX] + u[i + NX]) * 0.5 - uPrev[i];
      uPrev[i] = v * damp;
    }
  }
  const t = u; u = uPrev; uPrev = t;
}

function packSim() {
  for (let i = 0; i < u.length; i++) {
    let v = 128 + u[i] * 26;
    simBytes[i] = v < 1 ? 1 : v > 254 ? 254 : v;
  }
}

function gradAt(gx, gy) {
  const x = Math.max(1, Math.min(NX - 2, gx | 0));
  const y = Math.max(1, Math.min(NY - 2, gy | 0));
  const i = y * NX + x;
  return [u[i + 1] - u[i - 1], u[i + NX] - u[i - NX], u[i]];
}

/* ============================== WebGL ============================== */
const gl = glCv.getContext('webgl', { preserveDrawingBuffer: true, antialias: false })
        || glCv.getContext('experimental-webgl', { preserveDrawingBuffer: true });
let prog, texPhoto, texSim, uni = {};
let photoW = 1, photoH = 1;
let glReady = false;

const VSH = `
attribute vec2 aPos;
varying vec2 vUv;
void main(){
  vUv = vec2(aPos.x * 0.5 + 0.5, 0.5 - aPos.y * 0.5);
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const FSH = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D uPhoto;
uniform sampler2D uSim;
uniform vec2  uTexel;   // sim texel size
uniform vec2  uFrac;    // cover-crop fractions
uniform float uRefr;
uniform float uLight;
uniform float uTime;
uniform float uAspect;  // photoH / photoW

#define NF 5
uniform vec3 uFl[NF];   // cx, cy, r   (photo uv)
uniform vec4 uFlA[NF];  // rot, offX, offY, scale

float h(vec2 p){ return texture2D(uSim, p).r - 0.5019608; }

void main(){
  vec2 e = uTexel;
  float hl = h(vUv - vec2(e.x, 0.0));
  float hr = h(vUv + vec2(e.x, 0.0));
  float ht = h(vUv - vec2(0.0, e.y));
  float hb = h(vUv + vec2(0.0, e.y));
  vec2 grad = vec2(hr - hl, hb - ht);

  vec2 puv = (vUv - 0.5) * uFrac + 0.5;

  // floating blossoms: local swirl around each flower in the photo
  for (int i = 0; i < NF; i++) {
    vec2 d = puv - uFl[i].xy;
    vec2 dw = vec2(d.x, d.y * uAspect);
    float dist = length(dw);
    float r = uFl[i].z;
    if (dist < r) {
      float f = smoothstep(r, r * 0.3, dist);
      float ang = uFlA[i].x * f;
      float cs = cos(ang), sn = sin(ang);
      vec2 rotd = vec2(dw.x * cs - dw.y * sn, dw.x * sn + dw.y * cs);
      rotd *= mix(1.0, uFlA[i].w, f);
      puv = uFl[i].xy + vec2(rotd.x, rotd.y / uAspect) + uFlA[i].yz * f;
    }
  }

  puv += grad * uRefr;
  puv = clamp(puv, 0.002, 0.998);
  vec3 col = texture2D(uPhoto, puv).rgb;

  // diffuse ripple shading (sun upper-left)
  float light = (grad.x + grad.y) * 2.4;
  col += light * vec3(1.0, 0.98, 0.92);

  // specular glints on crests
  float spec = max(0.0, light - 0.045) * 5.5;
  col += spec * vec3(1.0, 1.0, 0.96);

  // slow drifting sun band
  float band = sin(dot(vUv, vec2(1.3, 1.0)) * 2.6 - uTime * 0.2);
  col += smoothstep(0.78, 1.0, band) * 0.065 * uLight;

  // wandering pool of sunlight
  vec2 sc = vec2(0.5 + 0.22 * cos(uTime * 0.07), 0.36 + 0.18 * sin(uTime * 0.09));
  float pool = 1.0 - smoothstep(0.0, 0.55, distance(vUv * vec2(1.0, 1.35), sc * vec2(1.0, 1.35)));
  col += pool * 0.055 * uLight;

  gl_FragColor = vec4(col, 1.0);
}`;

function makeShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(s));
  }
  return s;
}

function initGL() {
  prog = gl.createProgram();
  gl.attachShader(prog, makeShader(gl.VERTEX_SHADER, VSH));
  gl.attachShader(prog, makeShader(gl.FRAGMENT_SHADER, FSH));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  for (const n of ['uPhoto','uSim','uTexel','uFrac','uRefr','uLight','uTime','uAspect','uFl','uFlA']) {
    uni[n] = gl.getUniformLocation(prog, n);
  }
  gl.uniform1i(uni.uPhoto, 0);
  gl.uniform1i(uni.uSim, 1);
  gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
}

function setupPhotoTexture(img) {
  photoW = img.naturalWidth; photoH = img.naturalHeight;
  texPhoto = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texPhoto);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGB, gl.RGB, gl.UNSIGNED_BYTE, img);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
}

function setupSimTexture() {
  if (texSim) gl.deleteTexture(texSim);
  texSim = gl.createTexture();
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, texSim);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.LUMINANCE, NX, NY, 0, gl.LUMINANCE, gl.UNSIGNED_BYTE, simBytes);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
}

let coverFx = 1, coverFy = 1;
function updateCover() {
  // cover-crop: photo scaled to fill, center crop
  const s = Math.max(W / photoW, H / photoH);
  coverFx = W / (s * photoW);
  coverFy = H / (s * photoH);
  gl.uniform2f(uni.uFrac, coverFx, coverFy);
  gl.uniform2f(uni.uTexel, 1 / NX, 1 / NY);
  gl.uniform1f(uni.uAspect, photoH / photoW);
}

/* ============== photo blossoms: sway / breathe / ripple-kick ============== */
// flower regions in photo uv (center x, center y, radius in photo-width units)
const FLOWERS = [
  { cx: 0.28, cy: 0.21, r: 0.27, phase: 0.0, speed: 0.34, kick: 0 },   // mint aqua, upper-left
  { cx: 0.73, cy: 0.47, r: 0.28, phase: 2.1, speed: 0.27, kick: 0 },   // pale mint, right-center
  { cx: 0.20, cy: 0.70, r: 0.30, phase: 4.0, speed: 0.31, kick: 0 },   // soft pink, lower-left
  { cx: 0.83, cy: 0.92, r: 0.30, phase: 1.2, speed: 0.24, kick: 0 },   // blush, lower-right
  { cx: 0.92, cy: 0.05, r: 0.22, phase: 5.3, speed: 0.29, kick: 0 }    // pink, top-right crop
];
const flArr  = new Float32Array(FLOWERS.length * 3);
const flAArr = new Float32Array(FLOWERS.length * 4);

function updateFlowerAnim(t) {
  for (let i = 0; i < FLOWERS.length; i++) {
    const f = FLOWERS[i];
    // photo uv -> screen uv -> sim grid, to feel the ripples
    const su = (f.cx - 0.5) / coverFx + 0.5;
    const sv = (f.cy - 0.5) / coverFy + 0.5;
    const [dx, dy] = gradAt(su * NX, sv * NY);
    f.kick += ((dx + dy) * 0.5 - f.kick) * 0.08;        // smoothed wave kick
    const kick = Math.max(-0.12, Math.min(0.12, f.kick));
    const rot = Math.sin(t * f.speed + f.phase) * 0.05
              + Math.sin(t * f.speed * 1.7 + f.phase * 2.0) * 0.018
              + kick;
    const ox = Math.sin(t * 0.2 + f.phase) * 0.0042 + dx * 0.02;
    const oy = Math.cos(t * 0.17 + f.phase * 1.6) * 0.0038 + dy * 0.02;
    const sc = 1 + Math.sin(t * 0.45 + f.phase) * 0.013;
    flArr[i * 3]     = f.cx;
    flArr[i * 3 + 1] = f.cy;
    flArr[i * 3 + 2] = f.r;
    flAArr[i * 4]     = rot;
    flAArr[i * 4 + 1] = ox;
    flAArr[i * 4 + 2] = oy;
    flAArr[i * 4 + 3] = sc;
  }
  gl.uniform3fv(uni.uFl, flArr);
  gl.uniform4fv(uni.uFlA, flAArr);
}

/* =================== overlay petals (procedural) =================== */
function mulberry32(seed) {
  let a = seed;
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const PALETTES = [
  { petal:'#bce8de', edge:'#e6f8f2', deep:'#9fd8cb' },
  { petal:'#def0e2', edge:'#f4faf1', deep:'#c2e4cc' },
  { petal:'#f6cfde', edge:'#fde9f0', deep:'#eeb3ca' },
  { petal:'#f8dce6', edge:'#fdf0f5', deep:'#f0c2d2' }
];

function makePetalSprite(px, pal, seed) {
  const R = mulberry32(seed);
  const S = Math.ceil(px * 2.6);
  const cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const c = cv.getContext('2d');
  c.translate(S / 2, S / 2);
  c.rotate(R() * Math.PI * 2);
  c.globalAlpha = 0.85;
  const g = c.createLinearGradient(-px * 0.5, 0, px, 0);
  g.addColorStop(0, pal.edge);
  g.addColorStop(0.45, pal.petal);
  g.addColorStop(1, pal.edge);
  c.fillStyle = g;
  c.beginPath();
  c.moveTo(-px * 0.5, 0);
  c.bezierCurveTo(-px * 0.2, -px * 0.5, px * 0.66, -px * 0.44, px, -px * 0.06);
  c.quadraticCurveTo(px * 0.92, 0, px, px * 0.06);   // sakura notch
  c.bezierCurveTo(px * 0.66, px * 0.44, -px * 0.2, px * 0.5, -px * 0.5, 0);
  c.fill();
  c.globalAlpha = 0.4;
  c.strokeStyle = pal.deep;
  c.lineWidth = Math.max(0.5, px * 0.02);
  c.beginPath();
  c.moveTo(-px * 0.3, 0);
  c.quadraticCurveTo(px * 0.3, -px * 0.06, px * 0.85, 0);
  c.stroke();
  c.globalAlpha = 0.7;
  c.strokeStyle = 'rgba(255,255,255,0.9)';
  c.lineWidth = Math.max(0.6, px * 0.025);
  c.beginPath();
  c.moveTo(-px * 0.5, 0);
  c.bezierCurveTo(-px * 0.2, -px * 0.5, px * 0.66, -px * 0.44, px, -px * 0.06);
  c.stroke();
  return cv;
}

let petalsArr = [];
let seedBase = 11;

function makePetal(i) {
  const R = mulberry32(seedBase + i * 13);
  const frac = 0.024 + R() * 0.022;
  const px = frac * Math.min(W, H);
  return {
    nx: 0.08 + ((i * 0.41 + R() * 0.3) % 0.84),
    ny: 0.1 + ((i * 0.59 + R() * 0.3) % 0.8),
    vx: 0, vy: 0,
    rot: R() * Math.PI * 2,
    vr: (R() - 0.5) * 0.0022,
    phase: R() * Math.PI * 2,
    px,
    sprite: makePetalSprite(px * DPR, PALETTES[(R() * PALETTES.length) | 0], seedBase + i * 7)
  };
}
function syncPetals() {
  while (petalsArr.length < params.petals) petalsArr.push(makePetal(petalsArr.length));
  if (petalsArr.length > params.petals) petalsArr.length = params.petals;
}

function updatePetals(dt, t) {
  for (const p of petalsArr) {
    const [dx, dy] = gradAt(p.nx * NX, p.ny * NY);
    p.vx += dx * 0.0017;
    p.vy += dy * 0.0017;
    p.vx += Math.sin(t * 0.18 + p.phase) * 0.0000065;
    p.vy += Math.cos(t * 0.14 + p.phase * 1.7) * 0.0000065;
    const pad = 0.05;
    if (p.nx < pad) p.vx += (pad - p.nx) * 0.0007;
    if (p.nx > 1 - pad) p.vx -= (p.nx - (1 - pad)) * 0.0007;
    if (p.ny < pad) p.vy += (pad - p.ny) * 0.0007;
    if (p.ny > 1 - pad) p.vy -= (p.ny - (1 - pad)) * 0.0007;
    p.vx *= 0.984; p.vy *= 0.984;
    p.nx += p.vx * dt * 60;
    p.ny += p.vy * dt * 60;
    p.rot += p.vr + dx * 0.012;
  }
}

function drawPetals(t) {
  for (const p of petalsArr) {
    const h = gradAt(p.nx * NX, p.ny * NY)[2];
    const x = p.nx * W;
    const y = p.ny * H + h * 3;
    const sc = 1 + h * 0.15;
    const sw = p.sprite.width / DPR;
    // sunk shadow
    fctx.save();
    fctx.translate(x + p.px * 0.16, y + p.px * 0.26);
    fctx.rotate(p.rot);
    fctx.globalAlpha = 0.22;
    fctx.fillStyle = 'rgba(95,125,155,0.6)';
    fctx.beginPath();
    fctx.ellipse(0, 0, p.px * 0.8, p.px * 0.42, 0, 0, Math.PI * 2);
    fctx.fill();
    fctx.restore();
    // petal
    fctx.save();
    fctx.translate(x, y);
    fctx.rotate(p.rot + Math.sin(t * 1.1 + p.phase) * 0.04);
    fctx.scale(sc, sc);
    fctx.drawImage(p.sprite, -sw / 2, -sw / 2, sw, sw);
    fctx.restore();
  }
}

/* ============================ sparkles ============================ */
const sparkles = [];
function addSparkle(px, py, big) {
  const base = Math.max(1, Math.min(W, H) * 0.0042);
  sparkles.push({
    x: px, y: py,
    life: 0,
    max: 0.5 + Math.random() * (big ? 1.1 : 0.8),
    size: base * ((big ? 1.6 : 1) + Math.random() * (big ? 2.2 : 1.4)),
    rot: Math.random() * Math.PI,
    vy: -(2 + Math.random() * 5),
    warm: Math.random() < 0.3,
    iri: Math.random() < 0.22
  });
}
function burst(px, py, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * Math.min(W, H) * 0.06;
    addSparkle(px + Math.cos(a) * r, py + Math.sin(a) * r * 0.8, true);
  }
}
function spawnAmbient(dt) {
  let n = params.sparkle * 30 * dt;
  while (n > 0) {
    if (Math.random() < n) addSparkle(Math.random() * W, Math.random() * H, false);
    n -= 1;
  }
}
function updateDrawSparkles(dt, t) {
  fctx.save();
  fctx.globalCompositeOperation = 'lighter';
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.life += dt;
    if (s.life > s.max) { sparkles.splice(i, 1); continue; }
    const k = s.life / s.max;
    const al = Math.sin(k * Math.PI);
    const y = s.y + s.vy * s.life;
    const sz = s.size * (0.6 + 0.4 * al);
    fctx.save();
    fctx.translate(s.x, y);
    fctx.rotate(s.rot + k * 0.7);
    let g0;
    if (s.iri) {
      const hue = (t * 40 + s.rot * 90) % 360;
      g0 = fctx.createRadialGradient(0, 0, 0, 0, 0, sz * 2.2);
      g0.addColorStop(0, `hsla(${hue},85%,90%,${0.85 * al})`);
      g0.addColorStop(1, `hsla(${hue},85%,90%,0)`);
    } else {
      const col = s.warm ? '255,240,205' : '255,255,255';
      g0 = fctx.createRadialGradient(0, 0, 0, 0, 0, sz * 2.2);
      g0.addColorStop(0, `rgba(${col},${0.85 * al})`);
      g0.addColorStop(1, `rgba(${col},0)`);
    }
    fctx.fillStyle = g0;
    fctx.beginPath(); fctx.arc(0, 0, sz * 2.2, 0, Math.PI * 2); fctx.fill();
    fctx.strokeStyle = `rgba(255,255,255,${al})`;
    fctx.lineWidth = 1;
    fctx.lineCap = 'round';
    fctx.beginPath();
    fctx.moveTo(-sz * 1.9, 0); fctx.lineTo(sz * 1.9, 0);
    fctx.moveTo(0, -sz * 1.9); fctx.lineTo(0, sz * 1.9);
    fctx.stroke();
    fctx.restore();
  }
  fctx.restore();
}

/* ============================== layout ============================== */
function layout() {
  W = window.innerWidth;
  H = window.innerHeight;
  glCv.width = W * DPR;  glCv.height = H * DPR;
  fxCv.width = W * DPR;  fxCv.height = H * DPR;
  fctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  allocSim();
  if (glReady) {
    gl.viewport(0, 0, glCv.width, glCv.height);
    setupSimTexture();
    updateCover();
  }
  petalsArr = [];
  syncPetals();
}
window.addEventListener('resize', layout);

/* ============================== input ============================== */
const hint = document.getElementById('hint');
const cursorEl = document.getElementById('cursor');
let hinted = false;
let lastMx = -1, lastMy = -1;

function touchWater(px, py, big) {
  const gx = (px / W) * NX, gy = (py / H) * NY;
  if (big) {
    drop(gx, gy, 6, 2.2 * params.ripple);
    burst(px, py, Math.round(10 + params.sparkle * 12));
  } else {
    drop(gx, gy, 2.4, 0.45 * params.ripple);
  }
  if (!hinted) { hinted = true; hint.classList.add('gone'); }
}

const stage = document.getElementById('stage');
stage.addEventListener('pointermove', (e) => {
  cursorEl.style.opacity = 1;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  if (lastMx >= 0) {
    const dist = Math.hypot(e.clientX - lastMx, e.clientY - lastMy);
    if (dist > 2) touchWater(e.clientX, e.clientY, false);
  }
  lastMx = e.clientX; lastMy = e.clientY;
});
stage.addEventListener('pointerdown', (e) => touchWater(e.clientX, e.clientY, true));
stage.addEventListener('pointerleave', () => { cursorEl.style.opacity = 0; lastMx = -1; });

/* スマホは共有シート経由で「画像を保存」→ 写真アプリへ。PCはダウンロード */
$('btnSave').addEventListener('click', async () => {
  const out = document.createElement('canvas');
  out.width = glCv.width; out.height = glCv.height;
  const oc = out.getContext('2d');
  oc.drawImage(glCv, 0, 0);
  oc.drawImage(fxCv, 0, 0);
  const blob = await new Promise(res => out.toBlob(res, 'image/png'));
  if (!blob) return;
  const file = new File([blob], 'eau-de-printemps.png', { type: 'image/png' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); } catch (e) { /* キャンセル */ }
    return;
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eau-de-printemps.png';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});

/* ============================ main loop ============================ */
let lastT = performance.now();
let breathT = 0;

function frame(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  const t = now / 1000;

  // ambient life: gentle kisses on the surface
  breathT -= dt;
  if (breathT <= 0) {
    breathT = 0.4 + Math.random() * 1.3;
    drop(2 + Math.random() * (NX - 4), 2 + Math.random() * (NY - 4), 2, 0.14);
  }

  stepWater();
  packSim();

  // --- WebGL pass: photo + refraction + light ---
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, texSim);
  gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, NX, NY, gl.LUMINANCE, gl.UNSIGNED_BYTE, simBytes);
  gl.uniform1f(uni.uRefr, 0.42);
  gl.uniform1f(uni.uLight, params.light);
  gl.uniform1f(uni.uTime, t);
  updateFlowerAnim(t);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // --- 2D pass: petals + sparkles ---
  fctx.clearRect(0, 0, W, H);
  updatePetals(dt, t);
  drawPetals(t);
  spawnAmbient(dt);
  updateDrawSparkles(dt, t);

  requestAnimationFrame(frame);
}

/* ============================== boot ============================== */
const img = new Image();
img.onload = () => {
  initGL();
  setupPhotoTexture(img);
  glReady = true;
  layout();
  gl.viewport(0, 0, glCv.width, glCv.height);
  requestAnimationFrame(frame);
};
img.src = PHOTO_SRC;

})();
</script>
